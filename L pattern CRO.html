<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRO Lissajous Pattern Simulator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            margin: 0;
        }
        h2 {
            margin-top: 0;
            color: #00ff00;
        }
        canvas {
            background-color: #000000;
            border: 4px solid #333;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            margin-bottom: 20px;
        }
        .controls-container {
            background-color: #2a2a2a;
            padding: 20px 40px;
            border-radius: 12px;
            display: flex;
            gap: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        label {
            font-size: 14px;
            margin-bottom: 10px;
            color: #cccccc;
        }
        span {
            font-weight: bold;
            color: #00ff00;
        }
        input[type="range"] {
            cursor: pointer;
            width: 150px;
        }
    </style>
</head>
<body>

    <h2>Oscilloscope X-Y Mode Simulator</h2>

    <!-- CRO Screen -->
    <canvas id="croScreen" width="500" height="500"></canvas>

    <!-- Controls -->
    <div class="controls-container">
        <div class="slider-group">
            <label for="freqX">X-Axis Freq: <span id="valX">1</span> Hz</label>
            <input type="range" id="freqX" min="1" max="10" value="1" step="1">
        </div>
        
        <div class="slider-group">
            <label for="freqY">Y-Axis Freq: <span id="valY">2</span> Hz</label>
            <input type="range" id="freqY" min="1" max="10" value="2" step="1">
        </div>
        
        <div class="slider-group">
            <label for="phase">Phase Shift: <span id="valPhase">90</span>°</label>
            <input type="range" id="phase" min="0" max="360" value="90" step="1">
        </div>
    </div>

    <script>
        // Get elements
        const canvas = document.getElementById('croScreen');
        const ctx = canvas.getContext('2d');
        const freqXInput = document.getElementById('freqX');
        const freqYInput = document.getElementById('freqY');
        const phaseInput = document.getElementById('phase');
        
        const valX = document.getElementById('valX');
        const valY = document.getElementById('valY');
        const valPhase = document.getElementById('valPhase');

        // Drawing function
        function drawLissajous() {
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            
            // Leave a small margin from the edge of the screen
            const amplitudeX = width / 2 - 30; 
            const amplitudeY = height / 2 - 30;

            // Get current slider values
            const fX = parseFloat(freqXInput.value);
            const fY = parseFloat(freqYInput.value);
            const phaseDeg = parseFloat(phaseInput.value);
            
            // Convert degrees to radians for the math formula
            const phaseRad = phaseDeg * (Math.PI / 180);

            // Update text labels
            valX.textContent = fX;
            valY.textContent = fY;
            valPhase.textContent = phaseDeg;

            // 1. Clear the screen (Black background)
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            // 2. Draw CRO Grid (Graticule)
            ctx.strokeStyle = '#003300';
            ctx.lineWidth = 1;
            ctx.beginPath();
            // Vertical lines
            for(let i = 0; i <= width; i += 50) { 
                ctx.moveTo(i, 0); 
                ctx.lineTo(i, height); 
            }
            // Horizontal lines
            for(let i = 0; i <= height; i += 50) { 
                ctx.moveTo(0, i); 
                ctx.lineTo(width, i); 
            }
            ctx.stroke();

            // 3. Draw Center Axes
            ctx.strokeStyle = '#006600';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, 0); ctx.lineTo(centerX, height);
            ctx.moveTo(0, centerY); ctx.lineTo(width, centerY);
            ctx.stroke();

            // 4. Calculate and Draw the Lissajous Pattern
            ctx.strokeStyle = '#00FF00'; // Classic phosphor green
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.beginPath();

            const resolution = 1000; // Number of points to draw (higher = smoother curve)
            
            for (let i = 0; i <= resolution; i++) {
                // Time variable 't' goes from 0 to 2*PI
                const t = (i / resolution) * 2 * Math.PI;
                
                // Parametric equations for Lissajous figures
                const x = centerX + amplitudeX * Math.sin(fX * t + phaseRad);
                const y = centerY - amplitudeY * Math.sin(fY * t); // Minus because canvas Y coordinates go down

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
        }

        // Attach event listeners so the graph updates immediately when you move a slider
        freqXInput.addEventListener('input', drawLissajous);
        freqYInput.addEventListener('input', drawLissajous);
        phaseInput.addEventListener('input', drawLissajous);

        // Draw the initial pattern when the page loads
        drawLissajous();
    </script>
</body>
</html>
